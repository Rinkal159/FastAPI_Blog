{% extends "layout.html" %}

{% block body %}
<article class="content-section py-3 px-4 mb-4">
  <div class="d-flex align-items-start gap-4">

    <!-- profile picture -->
    <img class="rounded-circle article-img flex-shrink-0" src="{{url_for('static', path='profile_pics/default.jpg')}}"
      alt="{{ blog.author }}'s profile picture" width="64" height="64" loading="lazy">


    <div class="flex-grow-1">

      <!-- author and date posted -->
      <div class="article-metadata mb-4">
        <a class="me-2" href="#">{{ blog.author }}</a>
        <small class="text-body-secondary">{{ blog.posted_at }}</small>
      </div>

      <!-- title -->
      <h2 class="mb-2">
        <a class="article-title" href="">{{ blog.title }}</a>
      </h2>

      <!-- content -->
      <p class="article-content">{{ blog.content }}</p>

    </div>
  </div>
</article>
{% endblock %}
