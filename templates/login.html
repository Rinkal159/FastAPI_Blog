{% extends "layout.html" %}

{% block body %}
<div class="content-section py-3 px-4 mb-4">
    <h2 class="mb-4">Login</h2>
    <form id="loginForm">
        <!-- email -->
        <div class="mb-3">
            <label for="email" class="form-label">Email<span class="text-danger">*</span></label>
            <input type="email" class="form-control" id="email" name="username" required autocomplete="off" value="rinkal@gmail.com">
        </div>


        <!-- password -->
        <div class="mb-3">
            <label for="password" class="form-label">Password<span class="text-danger">*</span></label>
            <input type="password" class="form-control" id="password" name="password" required minlength="8" autocomplete="off" value="Rinkal@1234">
        </div>


        <!-- submit button -->
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p class="mt-3">
        Don't have an account? <a href="{{url_for('signup')}}">Signup here</a>
    </p>
</div>
{% endblock %}


{% block script %}
    <script type="module" src="/static/controllers/login.js"></script>
{% endblock %}
