{% extends "layout.html" %}

{% block body %}
<div class="content-section py-3 px-4 mb-4">
    <h2 class="mb-4">Signup</h2>
    <form id="signupForm" enctype="multipart/form-data">

        <div class="profile-picture-div">
            <img id="previewImage" class="img-preview" src="{{url_for('static', path='/profile_pictures/default_user.jpg')}}" alt="Profile picture">
            <input type="file" id="profilePicture" accept="image/*">
        </div>

        <!-- name -->
        <div class="mb-3">
            <label for="name" class="form-label">Name<span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="name" name="name" required minlength="4" maxlength="100" autocomplete="off">
        </div>


        <!-- email -->
        <div class="mb-3">
            <label for="email" class="form-label">Email<span class="text-danger">*</span></label>
            <input type="email" class="form-control" id="email" name="email" required autocomplete="off">
        </div>


        <!-- password -->
        <div class="mb-3">
            <label for="password" class="form-label">Password<span class="text-danger">*</span></label>
            <input type="password" class="form-control" id="password" name="password" required minlength="8" autocomplete="off">
            <div class="form-text">Must be at least 8 characters.</div>
        </div>


        <!-- confirm password -->
        <div class="mb-3">
            <label for="confirmPassword" class="form-label">Confirm Password<span class="text-danger">*</span></label>
            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required
                minlength="8" autocomplete="off">
            <div id="passwordError" class="text-danger d-none pt-2">Passwords do not match.</div>
        </div>


        <!-- bio -->
        <div class="mb-3">
            <label for="bio" class="form-label">Bio</label>
            <textarea class="form-control" name="bio" id="bio" rows="4"></textarea>
        </div>
        

        <!-- submit button -->
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
    <p class="mt-3">
        Already have an account? <a href="{{url_for('login')}}">Login here</a>
    </p>
</div>
{% endblock %}


{% block script %}
    <script type="module" src="/static/controllers/signup.js"></script>
{% endblock %}
